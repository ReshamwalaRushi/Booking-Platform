version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: booking-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: booking-platform
    volumes:
      - mongodb_data:/data/db
    networks:
      - booking-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: booking-backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password@mongodb:27017/booking-platform?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-super-secret}
      JWT_EXPIRES_IN: 7d
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@bookingplatform.com}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3001/api/v1/calendar/callback}
      ZOOM_ACCOUNT_ID: ${ZOOM_ACCOUNT_ID:-}
      ZOOM_CLIENT_ID: ${ZOOM_CLIENT_ID:-}
      ZOOM_CLIENT_SECRET: ${ZOOM_CLIENT_SECRET:-}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - booking-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: booking-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    environment:
      REACT_APP_API_URL: http://localhost:3001/api/v1
    depends_on:
      - backend
    networks:
      - booking-network

volumes:
  mongodb_data:

networks:
  booking-network:
    driver: bridge
